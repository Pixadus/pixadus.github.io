<!-- Display the countdown timer in an element -->
<html>
<head>
    <title>An Excited Clock</title>
    <style>
        html {
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%,rgba(0,0,0,0.6) 100%), url(/images/background.jpg);
            background-repeat: no-repeat;
            background-size: 100vw 100vh;
        } 
        #cdate {
            margin-top:15vh;
            font-size: 2em;
            color: silver;
        }
        #countdown {
            margin-top: 20vh;
            font-size: 5em;
            color: white;
        }
        #edate {
            margin-top: 20vh;
            font-size: 2em;
            color: silver;
        }
    </style>
</head>
<body>
<div>
    <center>
        <p id="cdate"></p>
        <p id="countdown"></p>
        <p id="edate">09/21/2019</p>
    </center>
</div>
<script>
// Set the date we're counting down to
var countDownDate = new Date("Sep 21, 2019 12:00:00").getTime();

// Update the count down every 1 second
var x = setInterval(function() {

  // Get todays date and time
  var current = new Date();
  var today = current.toLocaleDateString()
  var now = current.getTime();

  // Find the distance between now and the count down date
  var distance = countDownDate - now;

  // Time calculations for days, hours, minutes and seconds
  var days = Math.floor(distance / (1000 * 60 * 60 * 24));
  var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  var seconds = Math.floor((distance % (1000 * 60)) / 1000);

  // Display the result in the element with id="countdown"
  document.getElementById("cdate").innerHTML = today;
  document.getElementById("countdown").innerHTML = days + "d " + hours + "h "
  + minutes + "m " + seconds + "s ";

  // If the count down is finished, write some text
  if (distance < 0) {
    clearInterval(x);
    document.getElementById("countdown").innerHTML = "Yay";
  }
}, 1000);
</script>
</body>
</html>
